  #   depends_on:
  #     - frontend_service
  #   volumes:
  #     - ./logs:/app/logs
  #     - /var/run/docker.sock:/var/run/docker.sock
  #     - ./src/frontend_service/data:/app/frontend_logs
  #   command: ["bash", "cache_latencies.sh"]



volumes:
  order1_data:
  order2_data:
  order3_data:
  CACHE_ACTIVITY:

